name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install toolchain
        run: pip install -e ".[dev]"

      - name: skill-lint (strict) — the determinism gate
        run: skill-lint --strict skills/

      - name: skill-docs — Markdown links resolve
        run: skill-docs .

      - name: skill-readme — per-skill READMEs current
        run: skill-readme --check skills/

      - name: Toolchain tests
        run: pytest -q

      - name: Ruff
        run: ruff check tools/

      - name: Semgrep (SCA)
        run: semgrep scan --error --quiet --config semgrep.yml --config p/python --config p/secrets tools/
